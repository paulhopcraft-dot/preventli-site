<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Icon-only version for app icons, favicons, etc. -->
  <defs>
    <linearGradient id="shieldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E40AF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563EB;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Shield shape (centered and larger) -->
  <path d="M 20 15 L 50 5 L 80 15 L 80 50 Q 80 75, 50 95 Q 20 75, 20 50 Z" 
        fill="url(#shieldGradient)" 
        stroke="none"/>
  
  <!-- Check mark inside shield -->
  <path d="M 35 52 L 45 65 L 68 32" 
        stroke="#F59E0B" 
        stroke-width="6" 
        stroke-linecap="round" 
        stroke-linejoin="round"
        fill="none"/>
  
  <!-- Signal dots -->
  <circle cx="12" cy="45" r="4" fill="#F59E0B" opacity="0.7"/>
  <circle cx="8" cy="58" r="3" fill="#F59E0B" opacity="0.5"/>
  <circle cx="10" cy="32" r="3" fill="#F59E0B" opacity="0.5"/>
</svg>