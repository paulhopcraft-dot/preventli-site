<svg width="240" height="200" viewBox="0 0 240 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Stacked version for square/vertical spaces -->
  <defs>
    <linearGradient id="shieldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E40AF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563EB;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Shield shape (centered) -->
  <path d="M 90 20 L 120 10 L 150 20 L 150 55 Q 150 80, 120 100 Q 90 80, 90 55 Z" 
        fill="url(#shieldGradient)" 
        stroke="none"/>
  
  <!-- Check mark inside shield -->
  <path d="M 104 57 L 112 68 L 136 40" 
        stroke="#F59E0B" 
        stroke-width="4.5" 
        stroke-linecap="round" 
        stroke-linejoin="round"
        fill="none"/>
  
  <!-- Signal dots -->
  <circle cx="83" cy="52" r="3.5" fill="#F59E0B" opacity="0.7"/>
  <circle cx="76" cy="65" r="2.5" fill="#F59E0B" opacity="0.5"/>
  <circle cx="80" cy="40" r="2.5" fill="#F59E0B" opacity="0.5"/>
  
  <!-- Company name (centered) -->
  <text x="120" y="145" 
        font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" 
        font-size="36" 
        font-weight="700" 
        fill="#111827"
        text-anchor="middle"
        letter-spacing="-0.5">Preventli</text>
  
  <!-- Tagline (centered, multi-line) -->
  <text x="120" y="168" 
        font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" 
        font-size="10" 
        font-weight="400" 
        fill="#6B7280"
        text-anchor="middle"
        letter-spacing="0.3">WORKPLACE RISK &amp;</text>
  <text x="120" y="182" 
        font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" 
        font-size="10" 
        font-weight="400" 
        fill="#6B7280"
        text-anchor="middle"
        letter-spacing="0.3">EARLY INTERVENTION</text>
</svg>