<svg width="400" height="120" viewBox="0 0 400 120" xmlns="http://www.w3.org/2000/svg">
  <!-- White version for dark backgrounds -->
  <defs>
    <linearGradient id="shieldGradientWhite" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60A5FA;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#93C5FD;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Shield shape -->
  <path d="M 40 25 L 60 20 L 80 25 L 80 50 Q 80 70, 60 85 Q 40 70, 40 50 Z" 
        fill="url(#shieldGradientWhite)" 
        stroke="none"/>
  
  <!-- Check mark inside shield -->
  <path d="M 52 52 L 57 58 L 68 42" 
        stroke="#FBBF24" 
        stroke-width="3.5" 
        stroke-linecap="round" 
        stroke-linejoin="round"
        fill="none"/>
  
  <!-- Signal dots -->
  <circle cx="35" cy="45" r="2.5" fill="#FBBF24" opacity="0.7"/>
  <circle cx="30" cy="55" r="2" fill="#FBBF24" opacity="0.5"/>
  <circle cx="33" cy="35" r="2" fill="#FBBF24" opacity="0.5"/>
  
  <!-- Company name -->
  <text x="100" y="65" 
        font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" 
        font-size="42" 
        font-weight="700" 
        fill="#FFFFFF"
        letter-spacing="-0.5">Preventli</text>
  
  <!-- Tagline -->
  <text x="100" y="85" 
        font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" 
        font-size="12" 
        font-weight="400" 
        fill="#D1D5DB"
        letter-spacing="0.5">WORKPLACE RISK & EARLY INTERVENTION</text>
</svg>